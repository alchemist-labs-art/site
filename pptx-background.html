<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PPTX Background Generator — Ripple Grid</title>
  <style>
    body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #aaa; gap: 12px; }
    canvas { border: 1px solid #333; max-width: 90vw; }
    .controls { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .controls label { font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .controls input[type="range"] { width: 100px; }
    button { padding: 8px 20px; background: #e0e0e0; color: #111; border: none; cursor: pointer; font-size: 13px; font-family: 'Courier New', monospace; }
    button:hover { background: #fff; }
    .hint { font-size: 11px; color: #555; }
  </style>
</head>
<body>
  <div class="hint">dark</div>
  <canvas id="bg-dark" width="1920" height="1080"></canvas>
  <div class="hint">light</div>
  <canvas id="bg-light" width="1920" height="1080"></canvas>

  <div class="controls">
    <button onclick="generate()">Regenerate</button>
    <button onclick="download('dark')">Download Dark</button>
    <button onclick="download('light')">Download Light</button>
  </div>
  <div class="hint">1920×1080 · 16:9</div>

  <script>
    const W = 1920, H = 1080;
    const CELL = 14, SQUARE = 12;
    const cols = Math.floor(W / CELL);
    const rows = Math.floor(H / CELL);

    function renderGrid(canvas, baseV, gapV, dir) {
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = `rgb(${gapV},${gapV},${gapV})`;
      ctx.fillRect(0, 0, W, H);

      const waveX = W * (0.1 + Math.random() * 0.8);
      const spread = 500 + Math.random() * 600;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const px = c * CELL + SQUARE / 2;
          const dist = Math.abs(px - waveX);
          const wave = Math.max(0, 1 - dist / spread);
          const bump = wave * (2 + Math.random() * 3) * dir;
          const noise = (Math.random() - 0.5) * 2.5 * dir;
          const v = Math.round(dir > 0
            ? Math.max(baseV - 1, Math.min(baseV + 7, baseV + bump + noise))
            : Math.min(baseV + 1, Math.max(baseV - 7, baseV + bump + noise)));

          ctx.fillStyle = `rgb(${v},${v},${v})`;
          ctx.fillRect(c * CELL, r * CELL, SQUARE, SQUARE);
        }
      }

      ctx.filter = 'blur(6px)';
      ctx.drawImage(canvas, 0, 0);
      ctx.filter = 'none';
    }

    function generate() {
      renderGrid(document.getElementById('bg-dark'), 22, 15, 1);
      renderGrid(document.getElementById('bg-light'), 232, 245, -1);
    }

    function download(mode) {
      const a = document.createElement('a');
      a.download = `alkera-pptx-background-${mode}.png`;
      a.href = document.getElementById(`bg-${mode}`).toDataURL('image/png');
      a.click();
    }

    generate();
  </script>
</body>
</html>
