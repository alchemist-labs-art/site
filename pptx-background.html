<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PPTX Background Generator — Ripple Grid</title>
  <style>
    body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #aaa; gap: 12px; }
    canvas { border: 1px solid #333; max-width: 90vw; }
    .controls { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .controls label { font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .controls input[type="range"] { width: 100px; }
    button { padding: 8px 20px; background: #e0e0e0; color: #111; border: none; cursor: pointer; font-size: 13px; font-family: 'Courier New', monospace; }
    button:hover { background: #fff; }
    .hint { font-size: 11px; color: #555; }
  </style>
</head>
<body>
  <canvas id="bg" width="1920" height="1080"></canvas>

  <div class="controls">
    <label>frequency <input type="range" id="freq" min="0.01" max="0.08" step="0.002" value="0.035"></label>
    <label>intensity <input type="range" id="intensity" min="10" max="80" step="2" value="35"></label>
    <label>ripple origins <input type="range" id="origins" min="1" max="5" step="1" value="2"></label>
    <button onclick="regenerate()">Regenerate</button>
    <button onclick="download()">Download PNG</button>
  </div>
  <div class="hint">1920×1080 · 16:9 · tune sliders and regenerate</div>

  <script>
    const W = 1920, H = 1080;
    const CELL = 9, SQUARE = 8;
    const BG_V = 22;

    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    const cols = Math.floor(W / CELL);
    const rows = Math.floor(H / CELL);

    function generate(freq, intensity, numOrigins) {
      const origins = [];
      for (let i = 0; i < numOrigins; i++) {
        origins.push({
          x: W * (0.15 + Math.random() * 0.7),
          y: H * (0.15 + Math.random() * 0.7),
          phase: Math.random() * Math.PI * 2,
        });
      }

      ctx.fillStyle = `rgb(${BG_V - 7},${BG_V - 7},${BG_V - 7})`;
      ctx.fillRect(0, 0, W, H);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const px = c * CELL + SQUARE / 2;
          const py = r * CELL + SQUARE / 2;

          let wave = 0;
          for (const o of origins) {
            const dx = px - o.x;
            const dy = py - o.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            wave += Math.sin(dist * freq + o.phase);
          }
          wave /= numOrigins;

          const ripple = wave * intensity;
          const noise = (Math.random() - 0.5) * 6;
          const v = Math.max(BG_V - 4, Math.min(BG_V + intensity + 15, BG_V + ripple + noise));

          ctx.fillStyle = `rgb(${Math.round(v)},${Math.round(v)},${Math.round(v)})`;
          ctx.fillRect(c * CELL, r * CELL, SQUARE, SQUARE);
        }
      }
    }

    function regenerate() {
      const freq = parseFloat(document.getElementById('freq').value);
      const intensity = parseFloat(document.getElementById('intensity').value);
      const origins = parseInt(document.getElementById('origins').value);
      generate(freq, intensity, origins);
    }

    function download() {
      const a = document.createElement('a');
      a.download = 'alkera-pptx-background.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    generate(0.035, 35, 2);
  </script>
</body>
</html>
